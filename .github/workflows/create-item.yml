name: create-item

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Title / question for the FAQ item'
        required: true
        type: string
      answer:
        description: 'Answer body for the FAQ item'
        required: true
        type: string
      slack_thread_ts:
        description: 'Slack thread timestamp (optional)'
        required: false
        type: string
        default: ''

jobs:
  create-item:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build slug from title
        id: slug
        run: |
          LOWER=$(echo "${{ inputs.title }}" | tr '[:upper:]' '[:lower:]')
          TRANSLITERATED=$(echo "$LOWER" | iconv -f UTF-8 -t ASCII//TRANSLIT 2>/dev/null) || TRANSLITERATED="$LOWER"
          SLUG=$(echo "$TRANSLITERATED" | sed 's/[^a-z0-9]/_/g; s/__*/_/g; s/^_//; s/_$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=add_${SLUG}" >> "$GITHUB_OUTPUT"
          echo "file=${SLUG}.md" >> "$GITHUB_OUTPUT"

      - name: Fail if item already exists
        run: |
          if [ -f "${{ steps.slug.outputs.file }}" ]; then
            echo "::error::File '${{ steps.slug.outputs.file }}' already exists. Use update-item to modify an existing entry."
            exit 1
          fi

      - name: Create FAQ item file
        env:
          ITEM_TITLE: ${{ inputs.title }}
          ITEM_ANSWER: ${{ inputs.answer }}
          ITEM_SLACK_TS: ${{ inputs.slack_thread_ts }}
          ITEM_FILE: ${{ steps.slug.outputs.file }}
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          # Escape double-quotes in YAML scalar values to keep frontmatter valid
          TITLE_ESC="${ITEM_TITLE//\"/\\\"}"
          SLACK_TS_ESC="${ITEM_SLACK_TS//\"/\\\"}"
          {
            printf '---\n'
            printf 'slack_thread_ts: "%s"\n' "$SLACK_TS_ESC"
            printf 'title: "%s"\n' "$TITLE_ESC"
            printf 'created_at: %s\n' "$NOW"
            printf 'updated_at: %s\n' "$NOW"
            printf '---\n\n'
            printf '## Question\n%s\n\n' "$ITEM_TITLE"
            printf '## Answer\n%s\n' "$ITEM_ANSWER"
          } > "$ITEM_FILE"

      - name: Create branch and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.slug.outputs.branch }}"
          git add "${{ steps.slug.outputs.file }}"
          git commit -m "feat: add FAQ item – ${{ inputs.title }}"
          git push origin "${{ steps.slug.outputs.branch }}"

      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "feat: add FAQ item – ${{ inputs.title }}" \
            --body "New FAQ item created via the \`create-item\` workflow.

          **Title:** ${{ inputs.title }}
          **Slack thread ts:** ${{ inputs.slack_thread_ts }}

          ---
          *Auto-generated by the \`create-item\` GitHub Actions workflow.*" \
            --base main \
            --head "${{ steps.slug.outputs.branch }}"
